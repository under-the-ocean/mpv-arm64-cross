name: Build FFmpeg 8.1.1 (arm64 + V4L2 request)

on:
  workflow_dispatch:
    inputs:
      ffmpeg_version:
        description: FFmpeg version to build
        default: "8.1.1"
        type: string
      enable_libx264:
        description: Include libx264/libx265 encoder
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential nasm pkg-config python3 \
            libsdl2-dev libdrm-dev \
            libvpx-dev libmp3lame-dev libopus-dev \
            libvorbis-dev libtheora-dev libwebp-dev \
            libdav1d-dev libaom-dev libsvtav1-dev libzimg-dev \
            libsoxr-dev libsnappy-dev libxml2-dev \
            libfreetype6-dev libfontconfig-dev libfribidi-dev \
            libass-dev libharfbuzz-dev \
            libpulse-dev libjack-dev \
            libbluray-dev libzvbi-dev \
            libdvdnav-dev libdvdread-dev \
            ladspa-sdk frei0r-plugins-dev \
            libchromaprint-dev libbs2b-dev \
            libopencore-amrnb-dev libopencore-amrwb-dev \
            libgme-dev libopenmpt-dev libcodec2-dev librav1e-dev

      - name: Checkout FFmpeg
        run: |
          git clone --depth 1 --branch n${{ inputs.ffmpeg_version }} \
            https://git.ffmpeg.org/ffmpeg.git ffmpeg-${{ inputs.ffmpeg_version }}

      - name: Configure
        working-directory: ffmpeg-${{ inputs.ffmpeg_version }}
        run: |
          ./configure \
            --prefix=/usr \
            --enable-gpl --enable-version3 \
            --enable-static --disable-shared \
            --enable-v4l2-request \
            --enable-libdrm --enable-sdl2 \
            --enable-ffplay --enable-ffprobe \
            --enable-network --enable-openssl \
            --enable-libfreetype --enable-libfontconfig \
            --enable-libfribidi --enable-libass \
            --enable-libharfbuzz --enable-libmp3lame \
            --enable-libopus --enable-libvorbis \
            --enable-libtheora --enable-libvpx \
            --enable-libwebp --enable-libdav1d \
            --enable-libaom --enable-libsvtav1 \
            --enable-libsoxr --enable-libsnappy \
            --enable-libxml2 --enable-libpulse \
            --enable-libjack --enable-libbluray \
            --enable-libzvbi --enable-libbs2b \
            --enable-libopencore-amrnb --enable-libopencore-amrwb \
            --enable-libgme --enable-libopenmpt \
            --enable-libcodec2 --enable-librav1e \
            --enable-libzimg --enable-frei0r \
            --enable-chromaprint --enable-postproc \
            --enable-runtime-cpudetect \
            --enable-hardcoded-tables \
            --disable-doc \
            ${{ inputs.enable_libx264 && '--enable-libx264 --enable-libx265' || '' }}

      - name: Build
        working-directory: ffmpeg-${{ inputs.ffmpeg_version }}
        run: |
          make -j$(nproc)

      - name: Strip binaries
        working-directory: ffmpeg-${{ inputs.ffmpeg_version }}
        run: |
          strip ffmpeg ffplay ffprobe 2>/dev/null || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-${{ inputs.ffmpeg_version }}-arm64
          path: |
            ffmpeg-${{ inputs.ffmpeg_version }}/ffmpeg
            ffmpeg-${{ inputs.ffmpeg_version }}/ffplay
            ffmpeg-${{ inputs.ffmpeg_version }}/ffprobe
          compression-level: 6
