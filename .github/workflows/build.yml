name: Build mpv with v4l2-m2m for arm64

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Build mpv + ffmpeg in arm64 container
        run: |
          chmod -R a+rwX .
          docker run --rm -v `pwd`:/build arm64v8/ubuntu:noble bash -c '
            set -ex
            cd /build
            apt-get update -qq
            apt-get install -y -qq build-essential meson ninja-build pkg-config \
              curl git python3 \
              libass-dev libfreetype-dev libfontconfig-dev libfribidi-dev \
              libharfbuzz-dev libgnutls28-dev libdrm-dev libv4l-dev libva-dev \
              libx264-dev libx265-dev libopus-dev libmp3lame-dev \
              libpulse-dev libbluray-dev libdvdnav-dev libdvdread-dev \
              liblua5.2-dev libuchardet-dev liblcms2-dev libplacebo-dev \
              libjxl-dev librubberband-dev libzimg-dev liblz4-dev \
              libarchive-dev

            # Build FFmpeg
            curl -sL https://ffmpeg.org/releases/ffmpeg-7.1.tar.xz | tar xJ
            cd ffmpeg-7.1
            ./configure --prefix=/usr/local --enable-gpl --enable-version3 \
              --enable-libdrm --enable-libv4l2 --enable-v4l2-m2m \
              --enable-libx264 --enable-libx265 --enable-libopus \
              --enable-libpulse --enable-libass --enable-libfreetype \
              --enable-libfontconfig --enable-libfribidi --enable-libharfbuzz \
              --enable-libbluray --enable-libdvdnav --enable-libdvdread \
              --enable-libplacebo --enable-libjxl --enable-librubberband \
              --enable-libzimg --enable-pthreads --enable-avfilter \
              --enable-postproc --enable-runtime-cpudetect
            make -j$(nproc)
            make install
            ldconfig

            # Build mpv
            git clone --depth=1 https://github.com/mpv-player/mpv.git
            cd mpv
            ./bootstrap.py
            ./waf configure --prefix=/usr/local --enable-libmpv-shared \
              --enable-vulkan --disable-x11 --enable-libdrm \
              --enable-pulse --enable-libbluray --enable-dvdnav \
              --enable-lcms2 --enable-libarchive --enable-libass \
              --enable-lua --enable-uchardet --enable-zimg \
              --enable-vaapi
            ./waf -j$(nproc)
            ./waf install

            # Strip and copy to output
            strip /usr/local/bin/mpv
            mkdir -p /build/output/bin /build/output/lib
            cp /usr/local/bin/mpv /build/output/bin/
            cp /usr/local/lib/libmpv.so* /build/output/lib/ 2>/dev/null || true
            for lib in libavcodec libavformat libavutil libswscale libswresample libpostproc libavfilter libavdevice; do
              cp /usr/local/lib/$lib.so* /build/output/lib/ 2>/dev/null || true
            done
          '

      - name: Upload mpv binary
        uses: actions/upload-artifact@v4
        with:
          name: mpv-arm64
          path: output/
